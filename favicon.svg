<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Dark navy background circle -->
  <circle cx="16" cy="16" r="16" fill="#0d1f2d"/>

  <!-- ── ERLENMEYER / CONICAL FLASK ── -->

  <!-- Flask body outline (glass) — conical trapezoid shape -->
  <!-- Neck: narrow rectangle 12–20 x, y 4–12 -->
  <!-- Body: trapezoid widening from neck to base, y 12–27 -->
  <path d="M12,12 L8,26 Q7.5,27.5 9,27.5 L23,27.5 Q24.5,27.5 24,26 L20,12 Z"
        fill="none" stroke="#c8d8e8" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Pink liquid fill — fills about 55% of flask body from bottom -->
  <path d="M10.2,21 L8.3,26 Q7.9,27.5 9,27.5 L23,27.5 Q24.1,27.5 23.7,26 L21.8,21 Z"
        fill="#e8609a" opacity="0.92"/>

  <!-- Liquid surface — slightly curved to show meniscus -->
  <path d="M10.4,21 Q16,19 21.6,21"
        fill="none" stroke="#f0a0c8" stroke-width="1.0"/>

  <!-- Light reflection on pink liquid -->
  <ellipse cx="12.5" cy="24" rx="1.2" ry="2"
           fill="rgba(255,255,255,0.22)" transform="rotate(-10,12.5,24)"/>

  <!-- Flask neck (glass walls, two vertical lines) -->
  <line x1="12" y1="7" x2="12" y2="12" stroke="#c8d8e8" stroke-width="1.2"/>
  <line x1="20" y1="7" x2="20" y2="12" stroke="#c8d8e8" stroke-width="1.2"/>

  <!-- Flask mouth / rim — flat top of neck -->
  <rect x="11" y="5.5" width="10" height="2" rx="1"
        fill="#c8d8e8"/>

  <!-- Stopper / cork at neck top -->
  <rect x="12" y="3.5" width="8" height="2.5" rx="1"
        fill="#a8b8c8"/>

  <!-- Bubbles rising in the pink solution -->
  <circle cx="13.5" cy="25"   r="0.85" fill="rgba(255,255,255,0.35)"/>
  <circle cx="17"   cy="23.5" r="0.65" fill="rgba(255,255,255,0.28)"/>
  <circle cx="20"   cy="25.5" r="0.75" fill="rgba(255,255,255,0.3)"/>

  <!-- Small pink glow at base -->
  <ellipse cx="16" cy="27.5" rx="8" ry="2"
           fill="#e8609a" opacity="0.15"/>

</svg>
